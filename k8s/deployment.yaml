apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbna-outbound
  labels:
    app: dbna-outbound
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dbna-outbound
  template:
    metadata:
      labels:
        app: dbna-outbound
    spec:
      serviceAccountName: dbna-outbound
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: dbna-outbound
        image: dbna-outbound:latest
        imagePullPolicy: IfNotPresent
        ports:
         - name: http
           containerPort: 3310
           protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SPRING_APPLICATION_NAME
          value: "dbna-outbound"
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m"
        - name: STORAGE_BASE_PATH
          value: "/app/storage"
        envFrom:
        - configMapRef:
            name: dbna-outbound-config
        - secretRef:
            name: dbna-outbound-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: storage
          mountPath: /app/storage
        - name: config
          mountPath: /app/config
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
      - name: storage
        emptyDir:
          sizeLimit: 5Gi
      - name: config
        configMap:
          name: dbna-outbound-config
          optional: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - dbna-outbound
              topologyKey: kubernetes.io/hostname

