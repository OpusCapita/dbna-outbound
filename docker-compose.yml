version: '3.8'

services:
  main:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbna-outbound
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx512m -Xms256m
      - as4.keystore.path=keystore.jks
      - as4.keystore.password=changeit
      - as4.keystore.type=JKS
      - as4.key.alias=dbna
      - as4.key.password=changeit
      - as4.truststore.path=truststore.jks
      - as4.truststore.password=changeit
      - as4.truststore.type=JKS
      - as4.ssl.enabled=true
      - as4.ssl.verify-hostname=true
      - as4.ssl.protocol=TLS
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dbna-network

networks:
  dbna-network:
    driver: bridge

