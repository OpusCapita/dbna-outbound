version: '3.8'

services:
  main:
    image: opuscapita/dbna-outbound:dev
    container_name: dbna-outbound
    ports:
      - "3310:3310"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx512m -Xms256m
      - dbna.from-party-id=dbna-outbound
      - dbna.from-party-role=http://docs.oasis-open.org/ebxml-msg/ebms/v3.0/ns/core/200704/initiator
      - dbna.to-party-role=http://docs.oasis-open.org/ebxml-msg/ebms/v3.0/ns/core/200704/responder
      - dbna.service-type=
      - dbna.service=http://dbna.opuscapita.com/services
      - dbna.action=http://dbna.opuscapita.com/sendDocument
      - dbna.receiver.endpoint-url=http://localhost:3310/as4
      - dbna.retry.max-attempts=3
      - dbna.retry.delay-ms=1000
      - as4.keystore.path=keystore.jks
      - as4.keystore.password=changeit
      - as4.keystore.type=JKS
      - as4.key.alias=dbna
      - as4.key.password=changeit
      - as4.ssl.enabled=true
      - as4.ssl.verify-hostname=true
      - as4.ssl.protocol=TLS
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3310/api/health/check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dbna-network

networks:
  dbna-network:
    driver: bridge

